<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHESS</title>
    <meta name="description" content="Juego de ajedrez con IA Stockfish y multijugador online. Desarrollado con JavaScript, HTML5 y Firebase." />
    <meta name="keywords" content="ajedrez, chess, juego de ajedrez, stockfish, inteligencia artificial, multijugador online, firebase, javascript, html5" />
    <meta name="author" content="Programador GBA" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="img/logo-pequeñol.webp" type="image/webp" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- PANTALLA INICIAL -->
    <div id="screen-menu">
      <div class="menu-card">
        <div class="title-wrapper">
          <img id="app-icon" src="img/app_icon.webp" alt="Chess icon" class="title-icon" onerror="this.style.display = 'none'" />
          <div class="title-text">
            <h1 class="menu-title">CHESS</h1>
            <p class="menu-subtitle">ELIGE TU DESTINO</p>
          </div>
        </div>
        <button class="menu-btn btn-light" id="btn-vs-ai">STOCKFISH IA</button>
        <div class="separator"></div>
        <div class="multiplayer-section">
          <button class="menu-btn btn-dark" id="btn-create">CREAR PARTIDA</button>
          <div class="join-row">
            <input id="join-input" class="menu-input" type="text" placeholder="CÓDIGO" maxlength="8" autocomplete="off" autocapitalize="characters" />
            <button class="join-btn" id="btn-join">UNIRSE</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="screen-game" class="hidden">
      <div class="game-top-bar">
        <button class="back-btn" id="btn-back">← VOLVER</button>

        <!-- Nivel del motor — solo visible en modo VS IA -->
        <div id="level-display" class="level-display hidden">
          <span class="level-label">NIVEL</span>
          <span class="level-value" id="level-value">1</span>
        </div>

        <div id="game-code-display" class="game-code hidden">
          <span id="game-code-text"></span>
          <button id="btn-share" title="Compartir código">⎘</button>
        </div>

        <div id="thinking-indicator" class="thinking hidden">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>

      <div class="board-frame">
        <div id="board"></div>
      </div>

      <div id="turn-info" class="turn-info">Selecciona una pieza...</div>

      <div class="lore-card" id="lore-card">
        <div class="lore-empty" id="lore-empty">Selecciona una pieza...</div>
        <div class="lore-content hidden" id="lore-content">
          <img id="lore-avatar" src="" alt="" class="lore-avatar" />
          <div class="lore-text">
            <p class="lore-name" id="lore-name"></p>
            <p class="lore-desc" id="lore-desc"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL DE VICTORIA -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-box">
        <p class="modal-result-label" id="modal-result-label"></p>
        <div class="modal-avatar-wrapper">
          <img id="modal-avatar" src="" alt="" class="modal-avatar" onerror="this.style.display = 'none'" />
        </div>
        <h2 class="modal-char-name" id="modal-char-name"></h2>
        <p class="modal-quote" id="modal-quote"></p>
        <div class="modal-divider"></div>
        <p class="modal-side" id="modal-side"></p>
        <button class="menu-btn btn-light" id="btn-modal-continue">CONTINUAR</button>
      </div>
    </div>

    <script src="peerjs.min.js"></script>
    <script type="module" src="App.js"></script>
  </body>
</html>
